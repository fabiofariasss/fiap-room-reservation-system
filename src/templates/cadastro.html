{% extends "base.html" %}
{% block auth_content %}
<div class="auth-card">
    <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="color: var(--primary); font-weight: 800; font-size: 2.5rem; letter-spacing: -2px;">Cadastro</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Comece a gerenciar suas salas agora.</p>
    </div>
    
    <form method="POST" action="{{ url_for('auth.cadastro') }}">
        <div class="form-group">
            <label>Nome Completo</label>
            <input type="text" name="nome" required placeholder="Como quer ser chamado?">
        </div>
        <div class="form-group">
            <label>E-mail Institucional</label>
            <input type="email" name="email" required placeholder="aluno@fiap.com.br">
        </div>
        <div class="form-group" style="margin-bottom: 32px;">
            <label>Senha</label>
            <input type="password" name="senha" required placeholder="Mínimo 6 caracteres">
        </div>
        <button type="submit" class="btn btn-primary">Criar Conta</button>
    </form>
    <p style="margin-top: 32px; font-size: 0.875rem; color: var(--text-secondary);">
        Já possui conta? <a href="{{ url_for('auth.login') }}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Fazer Login</a>
    </p>
</div>
{% endblock %}
