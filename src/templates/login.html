{% extends "base.html" %}
{% block auth_content %}
<div class="auth-card">
    <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="color: var(--primary); font-weight: 800; font-size: 2.5rem; letter-spacing: -2px;">Login</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Acesse sua conta FIAP Rooms</p>
    </div>
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label>E-mail Corporativo</label>
            <input type="email" name="email" required placeholder="seu@email.com">
        </div>
        <div class="form-group" style="margin-bottom: 32px;">
            <label>Senha</label>
            <input type="password" name="senha" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary">Entrar no Dashboard</button>
    </form>
    <p style="margin-top: 32px; font-size: 0.875rem; color: var(--text-secondary);">
        Novo por aqui? <a href="{{ url_for('cadastro') }}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Crie uma conta gratuita</a>
    </p>
</div>
{% endblock %}
